# Project Information
site_name: Actian MCP Server
site_url: https://docs.actian.com/mcp-server/
site_description: >-
  Documentation for the Actian MCP Server — connect AI agents to Actian data sources via the Model Context Protocol.
use_directory_urls: false
docs_dir: docs
site_dir: site

# Theme Configuration
theme:
  name: material
  language: en
  custom_dir: theme_overrides/
  logo: assets/images/actian-logo.svg
  favicon: assets/favicon.png
  icon:
    repo: material/lifebuoy
  features:
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - navigation.top
    - navigation.path
    - navigation.footer
    - search.highlight
    - search.share
    - search.suggest
    - content.code.copy
    - content.code.annotate
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to light mode

# Markdown Extensions
markdown_extensions:
  - pymdownx.highlight:
      use_pygments: true
      pygments_lang_class: true
      auto_title: false
      linenums: false
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - tables
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - toc:
      title: On this page
      permalink: true
  - meta

# Copyright
copyright: >-
  Copyright &copy; 2026, Actian

# Support link (shown as a button in the header)
repo_url: https://www.actian.com/contact/
repo_name: Support

# Analytics (Google Analytics 4) + page feedback widget
extra:
  analytics:
    provider: custom
    property: G-NHC5CN295F
    feedback:
      title: Was this page helpful?
      ratings:
        - icon: material/thumb-up-outline
          name: This page was helpful
          data: 1
          note: >-
            Thanks for your feedback!
        - icon: material/thumb-down-outline
          name: This page could be improved
          data: 0
          note: >-
            Thanks for your feedback!

# Customization
extra_css:
  - stylesheets/site-theme.css
  - stylesheets/minichat.css

extra_javascript:
  - https://cdn.jsdelivr.net/npm/marked/marked.min.js
  - https://unpkg.com/mermaid@10/dist/mermaid.min.js
  - javascripts/mermaid-init.js
  - javascripts/extra.js
  - path: javascripts/MiniChatJavaScript.js
    defer: true

plugins:
  - search:
      lang: en
  - awesome-pages
  - tags
  - swagger-ui-tag
  - git-revision-date-localized:
      type: date
      enable_creation_date: false
      fallback_to_build_date: true
  - meta-descriptions

# Hooks
hooks:
  - hooks/copy_md_sources.py
